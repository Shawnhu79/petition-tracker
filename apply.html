<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簽呈申請建檔</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }
    .container { max-width: 600px; margin: 24px auto; padding: 0 16px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #444; }
    label .req { color: #e53935; margin-left: 2px; }
    input[type="text"],
    input[type="email"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #1a73e8; }
    input.error, select.error, textarea.error { border-color: #e53935; }
    .error-msg { color: #e53935; font-size: 12px; margin-top: 4px; display: none; }
    .error-msg.show { display: block; }
    textarea { resize: vertical; min-height: 80px; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }

    /* 會簽單位 checkbox */
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f0f4ff;
      border: 1.5px solid #c5d0f0;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
      user-select: none;
    }
    .checkbox-item input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; }
    .checkbox-item.checked { background: #1a73e8; border-color: #1a73e8; color: #fff; }

    /* 主簽鏈 */
    .main-chain { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chain-unit {
      background: #e8f0fe;
      border: 1.5px solid #1a73e8;
      color: #1a73e8;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
    }
    .chain-arrow { color: #999; font-size: 14px; }

    /* 按鈕 */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary {
      background: #f0f4ff;
      color: #1a73e8;
      border: 1.5px solid #1a73e8;
    }
    .btn-secondary:hover { background: #dce8ff; }

    /* 成功頁 */
    #successPage { display: none; }
    .success-header { text-align: center; padding: 24px 0 16px; }
    .success-icon { font-size: 48px; }
    .success-title { font-size: 22px; font-weight: bold; margin: 8px 0 4px; color: #1a73e8; }
    .doc-id-box {
      background: #e8f0fe;
      border: 2px solid #1a73e8;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      margin: 16px 0;
    }
    .doc-id-label { font-size: 12px; color: #666; margin-bottom: 4px; }
    .doc-id-value { font-size: 28px; font-weight: bold; color: #1a73e8; letter-spacing: 2px; }
    .qr-section { text-align: center; margin: 20px 0; }
    .qr-section canvas { border: 2px solid #eee; border-radius: 8px; padding: 8px; }
    .qr-hint { font-size: 12px; color: #888; margin-top: 8px; }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn-row .btn { width: auto; flex: 1; font-size: 14px; padding: 10px; }
    .email-notice {
      background: #e8f5e9;
      border: 1.5px solid #4caf50;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #2e7d32;
      margin: 12px 0;
    }
    .section-title { font-size: 13px; color: #666; font-weight: 600; margin-bottom: 8px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      max-width: 320px;
      text-align: center;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #c62828; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>📄 簽呈申請建檔</header>

<div class="container">

  <!-- 申請表單 -->
  <div id="formPage">
    <div class="card">

      <div class="form-group">
        <label for="applicantName">申請人姓名 <span class="req">*</span></label>
        <input type="text" id="applicantName" maxlength="20" placeholder="請輸入姓名">
        <div class="error-msg" id="err-applicantName">請填寫申請人姓名</div>
      </div>

      <div class="form-group">
        <label for="applicantUnit">申請人單位 <span class="req">*</span></label>
        <input type="text" id="applicantUnit" maxlength="20" placeholder="請輸入所屬單位">
        <div class="error-msg" id="err-applicantUnit">請填寫申請人單位</div>
      </div>

      <div class="form-group">
        <label for="applicantEmail">申請人 Email <span class="req">*</span></label>
        <input type="email" id="applicantEmail" placeholder="用於接收進度通知">
        <div class="error-msg" id="err-applicantEmail">請輸入有效的 Email 地址</div>
      </div>

      <div class="form-group">
        <label for="title">簽呈主旨 <span class="req">*</span></label>
        <input type="text" id="title" maxlength="200" placeholder="請輸入簽呈主旨">
        <div class="error-msg" id="err-title">請填寫簽呈主旨</div>
      </div>

      <div class="form-group">
        <label for="category">簽呈類別 <span class="req">*</span></label>
        <select id="category">
          <option value="">請選擇類別</option>
          <option value="簽呈">簽呈</option>
          <option value="合約會辦">合約會辦</option>
        </select>
        <div class="error-msg" id="err-category">請選擇簽呈類別</div>
      </div>

      <div class="form-group">
        <label>需會簽單位</label>
        <div class="hint">勾選本次需要會簽的單位（可多選）</div>
        <div class="checkbox-group" id="cosignGroup">
          <div style="color:#999;font-size:13px;">載入中...</div>
        </div>
      </div>

      <div class="form-group">
        <label>主簽鏈（固定，不可更改）</label>
        <div class="main-chain" id="mainChain">
          <div style="color:#999;font-size:13px;">載入中...</div>
        </div>
      </div>

      <div class="form-group">
        <label for="dueDate">預計完成日期 <span class="req">*</span></label>
        <input type="date" id="dueDate">
        <div class="error-msg" id="err-dueDate">請選擇預計完成日期</div>
      </div>

      <div class="form-group">
        <label for="attachmentNote">附件說明</label>
        <textarea id="attachmentNote" placeholder="說明實體附件內容（選填）"></textarea>
      </div>

      <button class="btn btn-primary" id="submitBtn" onclick="submitForm()">
        送出建檔申請
      </button>

    </div>
  </div>

  <!-- 建檔成功頁 -->
  <div id="successPage">
    <div class="card">
      <div class="success-header">
        <div class="success-icon">✅</div>
        <div class="success-title">建檔成功！</div>
        <div style="font-size:14px;color:#666;">請列印 QR Code 並附於實體文件上</div>
      </div>

      <div class="doc-id-box">
        <div class="doc-id-label">系統文號</div>
        <div class="doc-id-value" id="resultDocId">—</div>
      </div>

      <div class="email-notice">
        📧 建檔通知 Email 已寄出，點信中連結可隨時查看進度。
      </div>

      <div class="qr-section">
        <div class="section-title">QR Code（各關卡秘書掃碼收件用）</div>
        <canvas id="qrCanvas"></canvas>
        <div class="qr-hint">請列印或截圖後附於實體文件封面</div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="downloadQR()">⬇ 下載 PNG</button>
          <button class="btn btn-secondary" onclick="printQR()">🖨 列印</button>
        </div>
      </div>

      <button class="btn btn-primary" style="margin-top:16px;" onclick="resetForm()">
        再建一筆
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyYJNuVsEN7P_NhapRW8GthVg028jtRKoUXzYAr8cxQYggdL0SOI3YnfEnfo0GVxdiJ/exec';

// ── 初始化：載入設定 ──────────────────────────────────────
async function loadSettings() {
  try {
    const res  = await fetch(`${GAS_URL}?action=getSettings`);
    const data = await res.json();
    if (!data.success) throw new Error();

    // 會簽單位 checkboxes
    const group = document.getElementById('cosignGroup');
    if (data.cosign_units && data.cosign_units.length > 0) {
      group.innerHTML = data.cosign_units.map(u => `
        <label class="checkbox-item" onclick="toggleCheck(this)">
          <input type="checkbox" name="cosign" value="${u}"> ${u}
        </label>
      `).join('');
    } else {
      group.innerHTML = '<div style="color:#999;font-size:13px;">（無會簽單位）</div>';
    }

    // 主簽鏈
    const chain = document.getElementById('mainChain');
    if (data.main_chain && data.main_chain.length > 0) {
      chain.innerHTML = data.main_chain.map((u, i) =>
        `<span class="chain-unit">${u}</span>` +
        (i < data.main_chain.length - 1 ? '<span class="chain-arrow">→</span>' : '')
      ).join('');
    }
  } catch {
    showToast('載入設定失敗，請重新整理頁面', true);
  }
}

function toggleCheck(label) {
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
  label.classList.toggle('checked', cb.checked);
}

// ── 表單驗證 ──────────────────────────────────────────────
function validate() {
  let ok = true;
  const fields = [
    { id: 'applicantName',  check: v => v.trim().length > 0 },
    { id: 'applicantUnit',  check: v => v.trim().length > 0 },
    { id: 'applicantEmail', check: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) },
    { id: 'title',          check: v => v.trim().length > 0 },
    { id: 'category',       check: v => v !== '' },
    { id: 'dueDate',        check: v => v !== '' },
  ];
  fields.forEach(({ id, check }) => {
    const el  = document.getElementById(id);
    const err = document.getElementById(`err-${id}`);
    if (!check(el.value)) {
      el.classList.add('error');
      err.classList.add('show');
      ok = false;
    } else {
      el.classList.remove('error');
      err.classList.remove('show');
    }
  });
  return ok;
}

// ── 送出建檔 ──────────────────────────────────────────────
async function submitForm() {
  if (!validate()) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>建檔中...';

  const cosigned = [...document.querySelectorAll('input[name="cosign"]:checked')]
    .map(el => el.value);

  const payload = {
    applicant_name:  document.getElementById('applicantName').value.trim(),
    applicant_unit:  document.getElementById('applicantUnit').value.trim(),
    applicant_email: document.getElementById('applicantEmail').value.trim(),
    title:           document.getElementById('title').value.trim(),
    category:        document.getElementById('category').value,
    planned_cosign:  cosigned.join(','),
    due_date:        document.getElementById('dueDate').value,
    attachment_note: document.getElementById('attachmentNote').value.trim(),
  };

  try {
    const res  = await fetch(`${GAS_URL}?action=createDoc`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || '建檔失敗');
    showSuccess(data.doc_id, data.qr_url);
  } catch (err) {
    showToast(err.message || '建檔失敗，請稍後再試', true);
    btn.disabled = false;
    btn.innerHTML = '送出建檔申請';
  }
}

// ── 成功頁 ────────────────────────────────────────────────
function showSuccess(docId, qrUrl) {
  document.getElementById('formPage').style.display = 'none';
  document.getElementById('successPage').style.display = 'block';
  document.getElementById('resultDocId').textContent = docId;
  QRCode.toCanvas(document.getElementById('qrCanvas'), qrUrl, { width: 240, margin: 2 });
}

function downloadQR() {
  const link     = document.createElement('a');
  link.download  = `QRCode_${document.getElementById('resultDocId').textContent}.png`;
  link.href      = document.getElementById('qrCanvas').toDataURL('image/png');
  link.click();
}

function printQR() {
  const docId  = document.getElementById('resultDocId').textContent;
  const imgSrc = document.getElementById('qrCanvas').toDataURL('image/png');
  const win    = window.open('', '_blank');
  win.document.write(`
    <html><head><title>QR Code — ${docId}</title>
    <style>
      body { display:flex; flex-direction:column; align-items:center;
             justify-content:center; height:100vh; font-family:sans-serif; }
      img  { width:240px; border:1px solid #eee; padding:8px; }
      p    { margin-top:12px; font-size:20px; font-weight:bold; letter-spacing:2px; }
    </style></head>
    <body onload="window.print()">
      <img src="${imgSrc}"><p>${docId}</p>
    </body></html>
  `);
  win.document.close();
}

function resetForm() {
  document.getElementById('formPage').style.display = 'block';
  document.getElementById('successPage').style.display = 'none';
  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.innerHTML = '送出建檔申請';
  document.querySelectorAll('input[type="text"], input[type="email"], input[type="date"], textarea')
    .forEach(el => { el.value = ''; el.classList.remove('error'); });
  document.getElementById('category').value = '';
  document.querySelectorAll('input[name="cosign"]')
    .forEach(el => { el.checked = false; el.closest('label').classList.remove('checked'); });
  document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('show'));
}

// ── Toast 通知 ────────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast show${isError ? ' error' : ''}`;
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

// 啟動
loadSettings();
</script>
</body>
</html>
