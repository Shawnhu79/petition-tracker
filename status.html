<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簽呈進度查詢</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a73e8; color: #fff; padding: 16px 20px; text-align: center; font-size: 18px; font-weight: bold; }
    .container { max-width: 600px; margin: 24px auto; padding: 0 16px 48px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .card-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; }

    /* 狀態徽章 */
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge-registered { background: #e3f2fd; color: #1565c0; }
    .badge-inprogress { background: #fff3e0; color: #e65100; }
    .badge-archived   { background: #e8f5e9; color: #2e7d32; }
    .badge-returned   { background: #ffebee; color: #c62828; }

    /* 文件摘要 */
    .doc-title { font-size: 20px; font-weight: bold; margin: 10px 0 6px; line-height: 1.4; }
    .doc-id    { font-size: 13px; color: #888; margin-bottom: 14px; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .meta-item { background: #f8f9fa; border-radius: 8px; padding: 8px 10px; }
    .meta-label { font-size: 11px; color: #999; margin-bottom: 2px; }
    .meta-value { font-size: 14px; font-weight: 600; color: #333; }
    .meta-full  { grid-column: 1 / -1; }

    /* 警示橫幅 */
    .overdue-banner {
      background: #ffebee; border: 1.5px solid #ef9a9a; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 14px; font-size: 14px; color: #c62828; font-weight: 600;
    }
    .returned-banner {
      background: #fff3e0; border: 1.5px solid #ffb74d; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 14px; font-size: 14px; color: #e65100;
    }

    /* 資訊編輯區 */
    .btn-edit {
      padding: 6px 14px; border-radius: 20px; border: 1.5px solid #1a73e8;
      background: #fff; color: #1a73e8; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .btn-edit:hover { background: #e8f0fe; }
    .edit-form { display: none; margin-top: 4px; }
    .edit-form.show { display: block; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .form-group label .req { color: #e53935; margin-left: 2px; }
    .form-group input[type="text"],
    .form-group input[type="date"],
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 14px; font-family: inherit; color: #333;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #1a73e8;
    }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .edit-btns { display: flex; gap: 8px; margin-top: 4px; }
    .btn-save {
      flex: 1; padding: 12px; background: #1a73e8; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit;
    }
    .btn-save:hover { background: #1557b0; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-cancel-edit {
      flex: 1; padding: 12px; background: #f0f0f0; color: #555; border: none;
      border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit;
    }
    .btn-cancel-edit:hover { background: #e0e0e0; }

    /* 歷程時間軸 */
    .timeline { margin-top: 4px; }
    .tl-item  { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .tl-item:last-child { border-bottom: none; }
    .tl-dot   { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .tl-dot-receive { background: #1a73e8; }
    .tl-dot-archive { background: #2e7d32; }
    .tl-dot-return  { background: #c62828; }
    .tl-dot-create  { background: #9e9e9e; }
    .tl-body  { flex: 1; }
    .tl-action { font-size: 14px; font-weight: 600; }
    .tl-unit   { font-size: 13px; color: #555; }
    .tl-time   { font-size: 12px; color: #aaa; margin-top: 2px; }
    .tl-comment { font-size: 13px; color: #c62828; margin-top: 4px; background: #ffebee; padding: 6px 8px; border-radius: 6px; }
    .tl-empty  { color: #bbb; font-size: 13px; text-align: center; padding: 12px 0; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 320px; text-align: center; }
    .toast.show    { opacity: 1; }
    .toast.success { background: #2e7d32; }
    .toast.error   { background: #c62828; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }

    /* Loading / Error */
    .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 15px; }
    .spinner-lg { display: inline-block; width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    .error-page { text-align: center; padding: 60px 20px; }
    .error-icon { font-size: 48px; margin-bottom: 12px; }
    .error-msg-text { font-size: 15px; color: #666; }
    .no-param-hint { font-size: 14px; color: #888; margin-top: 8px; line-height: 1.6; }

    .btn-refresh { display: block; width: 100%; margin-top: 8px; padding: 12px; background: #f0f0f0; color: #555; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-refresh:hover { background: #e0e0e0; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>📋 簽呈進度查詢</header>
<div class="container" id="app">
  <div class="loading">
    <div class="spinner-lg"></div>
    <div>載入文件資料中…</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyYJNuVsEN7P_NhapRW8GthVg028jtRKoUXzYAr8cxQYggdL0SOI3YnfEnfo0GVxdiJ/exec';

const STATUS_LABEL = { REGISTERED: '已建檔', IN_PROGRESS: '流程進行中', ARCHIVED: '已歸檔', RETURNED: '已退件' };
const STATUS_CLASS = { REGISTERED: 'badge-registered', IN_PROGRESS: 'badge-inprogress', ARCHIVED: 'badge-archived', RETURNED: 'badge-returned' };
const ACTION_LABEL = { RECEIVE: '✅ 收件', ARCHIVE: '📁 歸檔', RETURN: '↩️ 退件', CREATE: '📄 建檔', FORCE_UPDATE: '⚙️ 管理員更新' };
const ACTION_DOT   = { RECEIVE: 'tl-dot-receive', ARCHIVE: 'tl-dot-archive', RETURN: 'tl-dot-return', CREATE: 'tl-dot-create', FORCE_UPDATE: 'tl-dot-create' };

let docData     = null;
let historyData = [];
let docId       = '';

(async function init() {
  const params = new URLSearchParams(location.search);
  docId = params.get('doc') || params.get('id') || '';
  if (!docId) { renderNoParam(); return; }
  try {
    const res  = await fetch(`${GAS_URL}?action=getDoc&doc_id=${encodeURIComponent(docId)}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.message || '查無此文件');
    docData     = data.doc;
    historyData = data.history || [];
    renderPage();
  } catch (e) {
    renderError(e.message || '載入失敗，請稍後重試');
  }
})();

// ── 渲染主頁面 ────────────────────────────────────────────
function renderPage() {
  const doc    = docData;
  const today  = new Date(); today.setHours(0,0,0,0);
  const isOver = doc.due_date && doc.status !== 'ARCHIVED' && new Date(doc.due_date) < today;

  document.getElementById('app').innerHTML = `
    ${isOver ? `<div class="overdue-banner">⚠️ 此文件已超過預計完成日，請留意進度。</div>` : ''}
    ${doc.status === 'RETURNED' ? `<div class="returned-banner">↩️ 此文件已退件，等待申請人補件後重新送件。</div>` : ''}

    <!-- 文件摘要 -->
    <div class="card">
      <span class="badge ${STATUS_CLASS[doc.status] || 'badge-registered'}">${STATUS_LABEL[doc.status] || doc.status}</span>
      <div class="doc-title">${esc(doc.title)}</div>
      <div class="doc-id">文號：${esc(doc.doc_id)}</div>
      <div class="meta-grid">
        <div class="meta-item">
          <div class="meta-label">申請人</div>
          <div class="meta-value">${esc(doc.applicant_name)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">申請單位</div>
          <div class="meta-value">${esc(doc.applicant_unit)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">類別</div>
          <div class="meta-value">${esc(doc.category)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">預計完成日</div>
          <div class="meta-value">${esc(doc.due_date)}${isOver ? ' ⚠️' : ''}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">建立時間</div>
          <div class="meta-value">${formatDate(doc.created_at)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">最後更新</div>
          <div class="meta-value">${formatDate(doc.updated_at)}</div>
        </div>
        ${doc.attachment_note ? `
        <div class="meta-item meta-full">
          <div class="meta-label">附件說明</div>
          <div class="meta-value">${esc(doc.attachment_note)}</div>
        </div>` : ''}
      </div>
    </div>

    <!-- 資訊編輯 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">資訊編輯</div>
        <button class="btn-edit" id="editToggleBtn" onclick="toggleEdit()">✏️ 編輯</button>
      </div>
      <div class="edit-form" id="editForm">
        <div class="form-group">
          <label for="editTitle">主旨 <span class="req">*</span></label>
          <input type="text" id="editTitle" value="${esc(doc.title)}" maxlength="100">
        </div>
        <div class="form-group">
          <label for="editCategory">類別</label>
          <select id="editCategory">
            <option value="合約會辦" ${doc.category === '合約會辦' ? 'selected' : ''}>合約會辦</option>
            <option value="簽呈" ${doc.category === '簽呈' ? 'selected' : ''}>簽呈</option>
            <option value="其他" ${(doc.category !== '合約會辦' && doc.category !== '簽呈') ? 'selected' : ''}>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label for="editDueDate">預計完成日</label>
          <input type="date" id="editDueDate" value="${esc(doc.due_date ? doc.due_date.substring(0,10) : '')}">
        </div>
        <div class="form-group">
          <label for="editAttachment">附件說明</label>
          <textarea id="editAttachment">${esc(doc.attachment_note || '')}</textarea>
        </div>
        <div class="edit-btns">
          <button class="btn-cancel-edit" onclick="toggleEdit()">取消</button>
          <button class="btn-save" id="editSaveBtn" onclick="saveEdit()">儲存</button>
        </div>
      </div>
    </div>

    <!-- 操作歷程 -->
    <div class="card">
      <div class="card-title">操作歷程</div>
      <div class="timeline">${renderTimeline()}</div>
    </div>

    <button class="btn-refresh" onclick="location.reload()">🔄 重新整理</button>
  `;
}

// ── 編輯切換 ──────────────────────────────────────────────
function toggleEdit() {
  const form = document.getElementById('editForm');
  const btn  = document.getElementById('editToggleBtn');
  const show = !form.classList.contains('show');
  form.classList.toggle('show', show);
  btn.textContent = show ? '✕ 關閉' : '✏️ 編輯';
}

// ── 儲存編輯 ──────────────────────────────────────────────
async function saveEdit() {
  const title    = document.getElementById('editTitle').value.trim();
  const category = document.getElementById('editCategory').value;
  const dueDate  = document.getElementById('editDueDate').value;
  const attach   = document.getElementById('editAttachment').value.trim();

  if (!title) { showToast('主旨為必填', 'error'); return; }

  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>儲存中…';

  try {
    const qs = new URLSearchParams({
      action:          'updateDoc',
      doc_id:          docId,
      title,
      category,
      due_date:        dueDate,
      attachment_note: attach,
    });
    const res  = await fetch(`${GAS_URL}?${qs.toString()}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.message || '儲存失敗');

    // 更新本地資料並重新渲染
    docData.title           = title;
    docData.category        = category;
    docData.due_date        = dueDate;
    docData.attachment_note = attach;
    renderPage();
    showToast('資訊已更新', 'success');
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '儲存';
    showToast(e.message || '儲存失敗，請重試', 'error');
  }
}

// ── 歷程時間軸 ────────────────────────────────────────────
function renderTimeline() {
  if (!historyData.length) return '<div class="tl-empty">尚無操作記錄</div>';
  return [...historyData].reverse().map(h => `
    <div class="tl-item">
      <div class="tl-dot ${ACTION_DOT[h.action] || 'tl-dot-create'}"></div>
      <div class="tl-body">
        <div class="tl-action">${ACTION_LABEL[h.action] || h.action}</div>
        <div class="tl-unit">${esc(h.actor_unit || '')}</div>
        <div class="tl-time">${formatTime(h.timestamp)}</div>
        ${h.comment ? `<div class="tl-comment">💬 ${esc(h.comment)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ── 無文號提示 ────────────────────────────────────────────
function renderNoParam() {
  document.getElementById('app').innerHTML = `
    <div class="error-page">
      <div class="error-icon">🔍</div>
      <div class="error-msg-text">請透過 Email 中的連結開啟此頁面</div>
      <div class="no-param-hint">此頁面需要文號才能顯示進度。<br>請從建檔成功通知 Email 中點擊「查看進度」連結。</div>
    </div>`;
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-page">
      <div class="error-icon">⚠️</div>
      <div class="error-msg-text">${esc(msg)}</div>
    </div>`;
}

// ── 工具 ──────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast show${type ? ' ' + type : ''}`;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} `
       + `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
